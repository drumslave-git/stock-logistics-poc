name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege needed for the Pages deployment (OIDC id-token).
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run test

      # Hash the raw token secret here so only its SHA-256 (not the token) ever
      # reaches the build. Empty secret → empty hash → gate stays open.
      # The hash is not sensitive (it ships in the bundle), so GITHUB_OUTPUT is fine.
      - name: Compute access token hash
        id: token
        env:
          TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "hash=$(node scripts/hash-token.mjs)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          # Only the token's SHA-256 hash is embedded (see docs/ADR.md → "Access gating").
          VITE_ACCESS_TOKEN_HASH: ${{ steps.token.outputs.hash }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      # Disable Jekyll processing of the static output.
      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
